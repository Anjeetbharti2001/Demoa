<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rgistration Form</title>
</head>

<body>
    <form action="/server">
        <h1>Student Registration Form </h1>
        <lebel for="text">Full Name </lebel>
        <input type="Name" id="name" placeholder="Enter full name">
        <br>
        <lebel for="Text">Father Name </lebel>
        <input type="Name" id="name" placeholder="Enter Father Name">
        <br>
        <label for="text">Postel Address</label>
        <input type="Address" id="address" placeholder="Enter Postel Address">
        <br>
        <label for="text">Personal Address</label>
        <input type="address" id="address" placeholder="Personal Address">
        <br><br>
        <h4>Gender</h4>
        <label for="Text">Male</label>
        <input type="radio" id="gender" value="gender">
        <label for="Text">Female</label>

        <label for="Text">Other</label>
        <input type="radio" id="gender" value="gender">
        <br><br>
        <label for="Text">Course Select</label>
        <select id="course name" value="course name">
            <option select="select">--Select your course--</option>
            <option value="course">MBA</option>
            <option value="course">BCA</option>
            <option value="course">B.Tech</option>
            <option value="course">M.Tech</option>
            <option value="COURSE">PHD</option>
        </select>
        <br><br>
        <H4><label for="text">City</label></H4>
        <select id="city" value="city">
            <option select="select">--Select your city--</option>
            <option value="city">Patna</option>
            <option value="City">Luckhnow</option>
            <option value="city">Delhi</option>
            <option value="city">Hyderabad</option>
            <option value="city">Chandi Garha</option>
            <option value="city">Kolkata</option>
            <option value="city">Bhubaneswar</option>
            <option value="city">Vishakhgapatnam</option>
        </select>
        <h4>
            <lebel for="text">District</lebel>
        </h4>
        <select id="district" value="district">
            <option select="select">--Chhoose your District--</option>
            <option value="district">Amritsar</option>
            <option value="district">bhopal</option>
            <option value="district">amethi</option>
            <option value="district">noida</option>
            <option value="district">warangal</option>
            <option value="district">ghaziyabad</option>
            <option value="district">haridwar</option>
            <option value="district">Gaya</option>
            <option value="district">Merut</option>
            <option value="district">Mirzapur</option>
            <option value="district">Amaravati</option>
        </select>
        <p>
            <h4><label for="text">State</label></h4>
            <select id="state" value="state">
            <option select="select">--Chhoose your State--</option>
            <option value="state">TamilNaddu</option>
            <option value="state">Keral</option>
            <option value="state">Goa</option>
            <option value="state">Telgana</option>
            <option value="distric">Karnatka</option>
            <option value="state">Andhrapradesh</option>
            <option value="State">chhattisgarh</option>
            <option value="state">MadhyaPradesh</option>
            <option value="state">Maharastra</option>
            <option value="state">Gujrat</option>
            <option value="state">Rajsthan</option>
            </select>
        </p>
        <label for="text">PinCode</label>
        <input type="pincode" id="pincode" placeholder="Enter PinCode"><br><br>
        <label for="Text">Email Id</label>
        <input type="email Address" id="email" placeholder="email@gamil.com"><br><br>
        <label for="text">Note</label> 
        <input type="text" id="text" placeholder="test..."><br><br>
        <label for="text">Mobile </label>
        <input type="Number" id="number" placeholder="number">
    </form>
</body>

</html>
